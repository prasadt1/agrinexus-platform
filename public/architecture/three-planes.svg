<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 624" role="img" aria-labelledby="archt archd" style="display:block;width:100%;min-width:720px;max-width:980px;height:auto;margin:0 auto" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"><title id="archt">Outturn control plane and data layer on the AgriNexus engine</title><desc id="archd">A green Vercel control plane and a green Amazon DynamoDB data layer (both added by H0) sit on the pre-existing grey AgriNexus engine of AWS services plus Meta WhatsApp. The engine writes nudges and replies into the table, Vercel reads the rolled-up outcomes over keyless OIDC, and the control plane re-nudges back into the engine at Step Functions and the NudgeSender. The control plane is extensible to partner APIs and IoT sensors.</desc><defs><marker id="ahInk" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1A1714"></path></marker><marker id="ahGreen" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#157347"></path></marker><marker id="ahMute" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6B655C"></path></marker></defs><g><rect x="12" y="12" width="13" height="13" rx="3" fill="#157347"></rect><text x="31" y="22.5" font-size="10.5" fill="#1A1714">Added by Outturn (H0)</text><rect x="184" y="12" width="13" height="13" rx="3" fill="#B9B2A6"></rect><text x="203" y="22.5" font-size="10.5" fill="#6B655C">AgriNexus engine — pre-existing (AWS AIdeas Innovation Award)</text></g><rect x="128" y="40" width="736" height="30" rx="8" fill="none" stroke="#3E8E63" stroke-width="1.1" stroke-dasharray="5 4"></rect><text x="496" y="59" text-anchor="middle" font-size="10.5" fill="#3E8E63">Extensible — partner APIs · IoT / soil sensors plug into the control plane</text><line x1="300" y1="70" x2="300" y2="86" stroke="#3E8E63" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#ahGreen)"></line><line x1="496" y1="70" x2="496" y2="86" stroke="#3E8E63" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#ahGreen)"></line><line x1="692" y1="70" x2="692" y2="86" stroke="#3E8E63" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#ahGreen)"></line><rect x="128" y="88" width="736" height="132" rx="12" fill="#E7F1EA" stroke="#157347" stroke-opacity="0.45" stroke-width="1.4"></rect><rect x="12" y="124" width="104" height="60" rx="10" fill="#157347"></rect><text x="64" y="149" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.4">CONTROL</text><text x="64" y="165" text-anchor="middle" font-size="9" fill="#fff" opacity="0.9">Vercel · Next.js</text><g><rect x="160" y="106" width="223.33333333333334" height="40" rx="8" fill="#fff" stroke="#157347" stroke-width="1.3" stroke-opacity="0.85"></rect><text x="271.6666666666667" y="129.4" text-anchor="middle" font-size="10" fill="#157347">Multi-tenant, white-label dashboard</text></g><g><rect x="393.33333333333337" y="106" width="223.33333333333334" height="40" rx="8" fill="#fff" stroke="#157347" stroke-width="1.3" stroke-opacity="0.85"></rect><text x="505.00000000000006" y="129.4" text-anchor="middle" font-size="10" fill="#157347">Cohort provisioning</text></g><g><rect x="626.6666666666667" y="106" width="223.33333333333334" height="40" rx="8" fill="#fff" stroke="#157347" stroke-width="1.3" stroke-opacity="0.85"></rect><text x="738.3333333333334" y="129.4" text-anchor="middle" font-size="10" fill="#157347">Stripe licensing</text></g><g><rect x="160" y="162" width="223.33333333333334" height="40" rx="8" fill="#fff" stroke="#157347" stroke-width="1.3" stroke-opacity="0.85"></rect><text x="271.6666666666667" y="185.4" text-anchor="middle" font-size="10" fill="#157347">Follow-through roll-ups</text></g><g><rect x="393.33333333333337" y="162" width="223.33333333333334" height="40" rx="8" fill="#fff" stroke="#157347" stroke-width="1.3" stroke-opacity="0.85"></rect><text x="505.00000000000006" y="185.4" text-anchor="middle" font-size="10" fill="#157347">Re-nudge / activate</text></g><g><rect x="626.6666666666667" y="162" width="223.33333333333334" height="40" rx="8" fill="#fff" stroke="#157347" stroke-width="1.3" stroke-opacity="0.85"></rect><text x="738.3333333333334" y="185.4" text-anchor="middle" font-size="10" fill="#157347">Reports · Audit · Leads</text></g><rect x="128" y="236" width="736" height="128" rx="12" fill="#E9F1EB" stroke="#157347" stroke-opacity="0.45" stroke-width="1.4"></rect><rect x="12" y="270" width="104" height="60" rx="10" fill="#157347"></rect><text x="64" y="295" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.3">DATA</text><text x="64" y="311" text-anchor="middle" font-size="9" fill="#fff" opacity="0.9">DynamoDB</text><g><rect x="160" y="251" width="340" height="34" rx="8" fill="#fff" stroke="#157347" stroke-width="1.3" stroke-opacity="0.85"></rect><text x="330" y="271.23" text-anchor="middle" font-size="9.5" fill="#157347">Single-table schema — cohorts · members · licenses</text></g><g><rect x="510" y="251" width="340" height="34" rx="8" fill="#fff" stroke="#157347" stroke-width="1.3" stroke-opacity="0.85"></rect><text x="680" y="271.23" text-anchor="middle" font-size="9.5" fill="#157347">Streams → Aggregator · DEDUPE# idempotency</text></g><g><rect x="160" y="291" width="340" height="34" rx="8" fill="#fff" stroke="#157347" stroke-width="1.3" stroke-opacity="0.85"></rect><text x="330" y="311.23" text-anchor="middle" font-size="9.5" fill="#157347">SUMMARY# follow-through roll-ups</text></g><g><rect x="510" y="291" width="340" height="34" rx="8" fill="#fff" stroke="#157347" stroke-width="1.3" stroke-opacity="0.85"></rect><text x="680" y="311.23" text-anchor="middle" font-size="9.5" fill="#157347">Audit table — Vercel Marketplace · own OIDC role</text></g><text x="160" y="352" font-size="8.5" fill="#6B655C">Shared base: the engine's raw rows (USER# · PROFILE · NUDGE#) live in the same table.</text><rect x="128" y="380" width="736" height="196" rx="12" fill="#F2F0EC" stroke="#B9B2A6" stroke-width="1.25"></rect><rect x="12" y="438" width="104" height="80" rx="10" fill="#7A756C"></rect><text x="64" y="472" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff" letter-spacing="0.3">ENGINE</text><text x="64" y="487" text-anchor="middle" font-size="8" fill="#fff" opacity="0.92">AgriNexus</text><text x="64" y="499" text-anchor="middle" font-size="8" fill="#fff" opacity="0.92">AWS + WhatsApp</text><g><rect x="160" y="394" width="223.33333333333334" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="271.6666666666667" y="409.06" text-anchor="middle" font-size="9" fill="#6B655C">API Gateway + WAF</text></g><g><rect x="393.33333333333337" y="394" width="223.33333333333334" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="505.00000000000006" y="409.06" text-anchor="middle" font-size="9" fill="#6B655C">Meta WhatsApp Cloud API</text></g><g><rect x="626.6666666666667" y="394" width="223.33333333333334" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="738.3333333333334" y="409.06" text-anchor="middle" font-size="9" fill="#6B655C">EventBridge — schedule + scheduler</text></g><rect x="160" y="422" width="690" height="24" rx="7" fill="#fff" stroke="#B9B2A6" stroke-opacity="0.55"></rect><text x="505" y="437.5" text-anchor="middle" font-size="9" fill="#6B655C">9 Lambdas — Webhook · Message · Voice · WebChat · Nudge · Reminder · ResponseDetector · WeatherPoller · DLQ</text><g><rect x="160" y="448" width="223.33333333333334" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="271.6666666666667" y="463.06" text-anchor="middle" font-size="9" fill="#6B655C">SQS FIFO ×2</text></g><g><rect x="393.33333333333337" y="448" width="223.33333333333334" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="505.00000000000006" y="463.06" text-anchor="middle" font-size="9" fill="#6B655C">Step Functions</text></g><g><rect x="626.6666666666667" y="448" width="223.33333333333334" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="738.3333333333334" y="463.06" text-anchor="middle" font-size="9" fill="#6B655C">SNS</text></g><g><rect x="160" y="478" width="165" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="242.5" y="493.06" text-anchor="middle" font-size="9" fill="#6B655C">Bedrock + Knowledge Base</text></g><g><rect x="335" y="478" width="165" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="417.5" y="493.06" text-anchor="middle" font-size="9" fill="#6B655C">Transcribe</text></g><g><rect x="510" y="478" width="165" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="592.5" y="493.06" text-anchor="middle" font-size="9" fill="#6B655C">Polly</text></g><g><rect x="685" y="478" width="165" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="767.5" y="493.06" text-anchor="middle" font-size="9" fill="#6B655C">S3 ×2</text></g><g><rect x="160" y="508" width="223.33333333333334" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="271.6666666666667" y="523.06" text-anchor="middle" font-size="9" fill="#6B655C">CloudWatch ×3</text></g><g><rect x="393.33333333333337" y="508" width="223.33333333333334" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="505.00000000000006" y="523.06" text-anchor="middle" font-size="9" fill="#6B655C">X-Ray</text></g><g><rect x="626.6666666666667" y="508" width="223.33333333333334" height="24" rx="8" fill="#fff" stroke="#B9B2A6" stroke-width="1" stroke-opacity="0.55"></rect><text x="738.3333333333334" y="523.06" text-anchor="middle" font-size="9" fill="#6B655C">Secrets Manager</text></g><text x="496" y="560" text-anchor="middle" font-size="9.5" fill="#6B655C" font-style="italic">100% serverless · multi-region ready · ~$0.54 / farmer / year</text><line x1="270" y1="380" x2="270" y2="364" stroke="#6B655C" stroke-width="2" marker-end="url(#ahMute)"></line><text x="282" y="375" font-size="9.5" fill="#6B655C">writes nudges &amp; replies</text><line x1="270" y1="236" x2="270" y2="220" stroke="#1A1714" stroke-width="2" marker-end="url(#ahInk)"></line><text x="282" y="231" font-size="9.5" fill="#5A554C">Vercel reads roll-ups · keyless OIDC</text><path d="M864,150 L900,150 Q912,150 912,162 L912,448 Q912,460 900,460 L866,460" fill="none" stroke="#157347" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#ahGreen)"></path><text transform="rotate(-90 938 305)" x="938" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#157347">re-nudge → Step Functions / NudgeSender</text></svg>
