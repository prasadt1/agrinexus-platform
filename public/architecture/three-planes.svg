<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 444" role="img" aria-labelledby="archt archd" style="display:block;width:100%;min-width:680px;max-width:900px;height:auto;margin:0 auto" font-family="system-ui, sans-serif"><title id="archt">Outturn: control plane, data plane, and engine</title><desc id="archd">Three stacked planes — a Vercel control plane, an Amazon DynamoDB data plane, and the AWS-plus-WhatsApp engine. The engine writes nudges and replies to the data plane, the control plane reads the rolled-up outcomes, and the control plane re-nudges or activates the engine over keyless OIDC.</desc><defs><marker id="ahInk" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1A1714"></path></marker><marker id="ahAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#B45309"></path></marker></defs><g><rect x="128" y="30" width="678" height="92" rx="12" fill="#F1EEEA" stroke="#1A1714" stroke-opacity="0.32" stroke-width="1.25"></rect><rect x="10" y="46" width="104" height="60" rx="10" fill="#1A1714"></rect><text x="62" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.5">CONTROL</text><text x="62" y="89" text-anchor="middle" font-size="9" fill="#fff" opacity="0.88">Vercel</text><g><rect x="150" y="57" width="206" height="38" rx="9" fill="#fff" stroke="#1A1714" stroke-opacity="0.4"></rect><text x="253" y="79.5" text-anchor="middle" font-size="10.5" fill="#1A1714">Next.js dashboard + APIs</text></g><g><rect x="368" y="57" width="206" height="38" rx="9" fill="#fff" stroke="#1A1714" stroke-opacity="0.4"></rect><text x="471" y="79.5" text-anchor="middle" font-size="10.5" fill="#1A1714">Re-nudge / activate</text></g><g><rect x="586" y="57" width="206" height="38" rx="9" fill="#fff" stroke="#1A1714" stroke-opacity="0.4"></rect><text x="689" y="79.5" text-anchor="middle" font-size="10.5" fill="#1A1714">Audit log → DynamoDB</text></g></g><g><rect x="128" y="170" width="678" height="92" rx="12" fill="#E2F1F5" stroke="#0E7490" stroke-opacity="0.32" stroke-width="1.25"></rect><rect x="10" y="186" width="104" height="60" rx="10" fill="#0E7490"></rect><text x="62" y="213" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.5">DATA</text><text x="62" y="229" text-anchor="middle" font-size="9" fill="#fff" opacity="0.88">Amazon DynamoDB</text><g><rect x="150" y="197" width="206" height="38" rx="9" fill="#fff" stroke="#0E7490" stroke-opacity="0.4"></rect><text x="253" y="219.5" text-anchor="middle" font-size="10.5" fill="#1A1714">Single table</text></g><g><rect x="368" y="197" width="206" height="38" rx="9" fill="#fff" stroke="#0E7490" stroke-opacity="0.4"></rect><text x="471" y="219.5" text-anchor="middle" font-size="10.5" fill="#1A1714">Streams → Aggregator</text></g><g><rect x="586" y="197" width="206" height="38" rx="9" fill="#fff" stroke="#0E7490" stroke-opacity="0.4"></rect><text x="689" y="219.5" text-anchor="middle" font-size="10.5" fill="#1A1714">SUMMARY# roll-ups</text></g></g><g><rect x="128" y="310" width="678" height="104" rx="12" fill="#E7F1EA" stroke="#157347" stroke-opacity="0.32" stroke-width="1.25"></rect><rect x="10" y="332" width="104" height="60" rx="10" fill="#157347"></rect><text x="62" y="359" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.5">ENGINE</text><text x="62" y="375" text-anchor="middle" font-size="9" fill="#fff" opacity="0.88">AWS + WhatsApp</text><g><rect x="150" y="343" width="151.5" height="38" rx="9" fill="#fff" stroke="#157347" stroke-opacity="0.4"></rect><text x="225.75" y="365.5" text-anchor="middle" font-size="10.5" fill="#1A1714">EventBridge schedule</text></g><g><rect x="313.5" y="343" width="151.5" height="38" rx="9" fill="#fff" stroke="#157347" stroke-opacity="0.4"></rect><text x="389.25" y="365.5" text-anchor="middle" font-size="10.5" fill="#1A1714">NudgeSender (SFN)</text></g><g><rect x="477" y="343" width="151.5" height="38" rx="9" fill="#fff" stroke="#157347" stroke-opacity="0.4"></rect><text x="552.75" y="365.5" text-anchor="middle" font-size="10.5" fill="#1A1714">WhatsApp Cloud API</text></g><g><rect x="640.5" y="343" width="151.5" height="38" rx="9" fill="#fff" stroke="#157347" stroke-opacity="0.4"></rect><text x="716.25" y="365.5" text-anchor="middle" font-size="10.5" fill="#1A1714">ResponseDetector</text></g></g><line x1="300" y1="170" x2="300" y2="124" stroke="#1A1714" stroke-width="2" marker-end="url(#ahInk)"></line><text x="312" y="150" font-size="10.5" fill="#5A554C">dashboard reads SUMMARY#</text><line x1="300" y1="310" x2="300" y2="264" stroke="#1A1714" stroke-width="2" marker-end="url(#ahInk)"></line><text x="312" y="290" font-size="10.5" fill="#5A554C">engine writes nudges &amp; replies → Streams</text><path d="M806,76 L832,76 Q840,76 840,84 L840,352 Q840,360 832,360 L810,360" fill="none" stroke="#B45309" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#ahAmber)"></path><text transform="rotate(-90 858 218)" x="858" y="218" text-anchor="middle" font-size="10.5" font-weight="600" fill="#B45309">re-nudge / activate · OIDC</text></svg>
